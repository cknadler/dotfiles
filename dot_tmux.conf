###
# Behavior
###

set -g base-index 1

# Vim is amazing
setw -g mode-keys vi

set-window-option -g display-panes-time 1500

###
# keybindings
###

# C-b < C-a
set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix

# Vim-like copy/paste (modern tmux syntax, no reattach-to-user-namespace needed)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key [ copy-mode
bind-key ] paste-buffer

# use vim-like keys for splits and windows
bind-key v split-window -h
bind-key s split-window -v
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# smart pane switching with awareness of vim/nvim splits
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)n?vim?x?$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)n?vim?x?$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)n?vim?x?$' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)n?vim?x?$' && tmux send-keys C-l) || tmux select-pane -R"
bind -n C-\ run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)n?vim?x?$' && tmux send-keys 'C-\\') || tmux select-pane -l"
bind C-l send-keys 'C-l'

# meta
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
bind-key : command-prompt
bind-key r refresh-client
bind-key L clear-history

# window switching
bind-key n next-window
bind-key p previous-window
bind-key u last-window

# layout switching
bind-key enter next-layout

# quick termination
bind -n C-x kill-pane
bind -n C-X kill-window

# syncing is so rad
bind-key a setw synchronize-panes

###
# visual
###

set-option -g default-terminal screen-256color

# Status Bar
set-option -g status-interval 1
set-option -g status-left ''
set-option -g status-right '%l:%M%p'
set-window-option -g window-status-current-fg magenta
set-option -g status-fg default
set-option -g status-bg black
set-option -g pane-active-border-fg black
set-option -g pane-border-fg black

# Set window notifications
setw -g monitor-activity on
set -g visual-activity on

# pane borders and colors
set-option -g pane-active-border-fg yellow
set-option -g pane-border-fg white
